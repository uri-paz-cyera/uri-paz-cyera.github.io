document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

n  --grey-600:  #585858;\n  --grey-700:  #464646;\n  --grey-800:  #2D2D2D;\n  --grey-900:  #121212;\n\n  /* =========================================================\n     PRIMITIVES — Brand Accent (near-black, pairs with white)\n     ========================================================= */\n  --accent-0:    #FFFFFF;\n  --accent-25:   #F7F7F7;\n  --accent-50:   #EFEFEF;\n  --accent-100:  #DCDCDC;\n  --accent-200:  #B0B0B0;\n  --accent-300:  #7B7B7B;\n  --accent-400:  #464646;\n  --accent-700:  #2D2D2D;\n  --accent-800:  #1E1E1E;\n  --accent-900:  #121212;\n\n  /* =========================================================\n     PRIMITIVES — Blues (informative)\n     ========================================================= */\n  --blue-25:   #F5F8FF;\n  --blue-50:   #E2ECFF;\n  --blue-100:  #B2CCFF;\n  --blue-150:  #8FB3FF;\n  --blue-200:  #5C8FFF;\n  --blue-300:  #3781FF;\n  --blue-400:  #2A6BE0;\n  --blue-500:  #1A65E5;\n  --blue-600:  #005EFF;\n\n  /* =========================================================\n     PRIMITIVES — Reds (danger / destructive)\n     ========================================================= */\n  --red-25:   #FEF6F6;\n  --red-50:   #FEFDFE;\n  --red-100:  #FBD0D1;\n  --red-150:  #F09FA1;\n  --red-200:  #E76E70;\n  --red-300:  #DB4D4F;\n  --red-400:  #D52A2E;\n  --red-500:  #EA1519;\n  --red-600:  #CC0003;\n  --red-700:  #901D1F;\n\n  /* =========================================================\n     PRIMITIVES — Greens (success)\n     ========================================================= */\n  --green-25:  #E0F9E1;\n  --green-50:  #C8F2CC;\n  --green-100: #94E5A0;\n  --green-200: #5CD27D;\n  --green-300: #2CC062;\n  --green-400: #10BC77;\n  --green-500: #099C5E;\n  --green-600: #066A40;\n\n  /* =========================================================\n     PRIMITIVES — Yellows (warning)\n     ========================================================= */\n  --yellow-25:  #FFF9E5;\n  --yellow-50:  #FFEFB0;\n  --yellow-100: #FFE17A;\n  --yellow-200: #FFD000;\n  --yellow-300: #E5B600;\n  --yellow-400: #B98E00;\n  --yellow-500: #8C6A00;\n  --yellow-600: #352706;\n\n  /* =========================================================\n     PRIMITIVES — Oranges (alt warning / highlight)\n     ========================================================= */\n  --orange-25:  #FEF1E8;\n  --orange-50:  #FEDDCD;\n  --orange-100: #FDB58A;\n  --orange-200: #FB8642;\n  --orange-300: #F26514;\n  --orange-400: #C24F0F;\n  --orange-500: #8E3A0B;\n  --orange-600: #351906;\n\n  /* =========================================================\n     PRIMITIVES — Purples (insight / AI)\n     ========================================================= */\n  --purple-25:   #F7F3FE;\n  --purple-50:   #E9DEFC;\n  --purple-100:  #DFCFFB;\n  --purple-200:  #C7AAF8;\n  --purple-300:  #A87EF4;\n  --purple-400:  #9747FF;\n\n  /* =========================================================\n     PRIMITIVES — Lavenders (interactive blue / link)\n     ========================================================= */\n  --lavender-25:  #F0F2FF;\n  --lavender-100: #CCD3FF;\n  --lavender-300: #6B7FFF;\n  --lavender-400: #3781FF;\n\n  /* =========================================================\n     PRIMITIVES — Pink, Teal, Navigation (utility brand)\n     ========================================================= */\n  --pink-50:        #FFE1F8;\n  --pink-450:       #FF66C4;\n  --teal-50:        #E3F7FF;\n  --teal-450:       #2EC0F2;\n  --navigation-25:  #E0F9E1;\n  --navigation-150: #16C95B;\n\n  /* =========================================================\n     SEMANTIC — Surface\n     ========================================================= */\n  --surface-primary-default:    var(--grey-0);\n  --surface-secondary-default:  var(--grey-25);\n  --surface-subtle-default:     var(--grey-10);\n  --surface-primary-hover:      var(--grey-50);\n  --surface-primary-selected:   var(--grey-25);\n  --surface-primary-disabled:   var(--grey-50);\n  --surface-primary-loading:    var(--grey-50);\n  --surface-primary-inverted:   var(--grey-900);\n  --surface-primary-accent:     var(--grey-900);\n  --surface-secondary-accent:   var(--navigation-25);\n  --surface-primary-focused:    var(--grey-50);\n  --surface-informative:        var(--blue-25);\n  --surface-danger:             var(--red-25);\n  --surface-success:            var(--green-25);\n  --surface-insight:            var(--purple-25);\n  --surface-warning:            var(--yellow-25);\n\n  /* =========================================================\n     SEMANTIC — Text\n     ========================================================= */\n  --text-primary:            var(--grey-900);\n  --text-secondary:          var(--grey-700);\n  --text-description:        var(--grey-600);\n  --text-placeholder:        var(--grey-400);\n  --text-helpertext:         var(--grey-500);\n  --text-helpertext-disabled:var(--grey-400);\n  --text-disabled:           var(--grey-400);\n  --text-loading:            var(--grey-400);\n  --text-accent:             var(--grey-900);\n  --text-error:              var(--red-500);\n  --text-inverted:           var(--grey-0);\n  --text-link:               var(--blue-500);\n\n  /* =========================================================\n     SEMANTIC — Icon\n     ========================================================= */\n  --icon-primary:           var(--grey-900);\n  --icon-subtle:            var(--grey-500);\n  --icon-interactive-hover: var(--grey-900);\n  --icon-interactive-selected: var(--grey-900);\n  --icon-interactive-disabled: var(--grey-400);\n  --icon-primary-inverted:  var(--grey-0);\n  --icon-accent-inverted:   var(--accent-0);\n  --icon-accent:            var(--grey-900);\n  --icon-destructive:       var(--red-500);\n  --icon-success:           var(--green-400);\n  --icon-informative:       var(--blue-500);\n  --icon-danger:            var(--red-500);\n  --icon-insight:           var(--purple-400);\n  --icon-warning:           var(--yellow-500);\n\n  /* =========================================================\n     SEMANTIC — Border\n     ========================================================= */\n  --border-primary:               var(--grey-100);\n  --border-secondary:             var(--grey-200);\n  --border-tertiary:              var(--grey-100);\n  --border-interactive-hover:     var(--grey-900);\n  --border-interactive-focused:   var(--grey-900);\n  --border-interactive-selected:  var(--grey-900);\n  --border-interactive-disabled:  var(--grey-200);\n  --border-interactive-error:     var(--red-600);\n  --border-informative:           var(--blue-150);\n  --border-danger:                var(--red-150);\n  --border-success:               var(--green-200);\n  --border-insight:               var(--purple-100);\n  --border-warning:               var(--yellow-300);\n\n  /* =========================================================\n     SPACING — 16-step scale\n     ========================================================= */\n  --spacing-1:  2px;\n  --spacing-2:  4px;\n  --spacing-3:  6px;\n  --spacing-4:  8px;\n  --spacing-5:  12px;\n  --spacing-6:  16px;\n  --spacing-7:  20px;\n  --spacing-8:  24px;\n  --spacing-9:  32px;\n  --spacing-10: 40px;\n  --spacing-11: 48px;\n  --spacing-12: 56px;\n  --spacing-13: 64px;\n  --spacing-14: 72px;\n  --spacing-15: 80px;\n\n  /* =========================================================\n     RADIUS\n     ========================================================= */\n  --radius-1: 2px;   /* tight elements: tag dot, focus pip */\n  --radius-2: 4px;   /* compact controls, table cells */\n  --radius-3: 6px;   /* default: buttons, inputs, small cards */\n  --radius-4: 8px;   /* cards, menus, popovers */\n  --radius-5: 12px;  /* sheets, modals, hero cards */\n  --radius-6: 999px; /* pills, avatars */\n\n  /* =========================================================\n     SHADOWS\n     ========================================================= */\n  --shadow-xs:  0 1px 1 u002Fpath><path d=\"M15 19l2 2l4 -4\"><\u002Fpath><\u002Fsvg><span style=\"font:600 15px/20px var(--font-sans);color:var(--grey-900)\">Resolved the subject and checked authenticity<\u002Fspan><span style=\"font:400 13px/18px var(--font-sans);color:var(--grey-400)\">Worked for 4s<\u002Fspan><\u002Fdiv>\n            <p style=\"margin:0 0 20px;padding-left:29px;max-width:680px;font:400 15px/24px var(--font-sans);color:var(--grey-800)\">Confirmed self — Enzo’s activity throughout the window matches his known device, IP range, and working hours. No indicators of account takeover. <span style=\"color:var(--grey-500)\">Next: mapping what he actually did.<\u002Fspan><\u002Fp>\n          <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ r2 }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"animation:lumi-fade .34s var(--ease-standard) both\">\n            <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:10px\"><svg width=\"19\" height=\"19\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"color:var(--grey-500)\"><path stroke=\"none\" d=\"M0 0h24v24H0z\" fill=\"none\"><\u002Fpath><path d=\"M3 12h4l3 8l4 -16l3 8h4\"><\u002Fpath><\u002Fsvg><span style=\"font:600 15px/20px var(--font-sans);color:var(--grey-900)\">Mapped his activity against his own baseline<\u002Fspan><span style=\"font:400 13px/18px var(--font-sans);color:var(--grey-400)\">Worked for 5s<\u002Fspan><\u002Fdiv>\n            <p style=\"margin:0 0 20px;padding-left:29px;max-width:680px;font:400 15px/24px var(--font-sans);color:var(--grey-800)\">214 SharePoint/OneDrive accesses in his final week — 5.3× his ~40/week baseline. The mix skews toward Sales objects he doesn’t normally touch daily. <span style=\"color:var(--grey-500)\">Next: checking whether anything left the tenant.<\u002Fspan><\u002Fp>\n          <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if val round\" stroke-linejoin=\"round\" style=\"color:var(--grey-500)\"><path stroke=\"none\" d=\"M0 0h24v24H0z\" fill=\"none\"><\u002Fpath><path d=\"M5.931 6.936l1.275 4.249m5.607 5.609l4.251 1.275\"><\u002Fpath><path d=\"M11.683 12.317l5.759 -5.759\"><\u002Fpath><path d=\"M5.5 5.5m-1.5 0a1.5 1.5 0 1 0 3 0a1.5 1.5 0 1 0 -3 0\"><\u002Fpath><path d=\"M18.5 5.5m-1.5 0a1.5 1.5 0 1 0 3 0a1.5 1.5 0 1 0 -3 0\"><\u002Fpath><path d=\"M18.5 18.5m-1.5 0a1.5 1.5 0 1 0 3 0a1.5 1.5 0 1 0 -3 0\"><\u002Fpath><path d=\"M8.5 15.5m-4.5 0a4.5 4.5 0 1 0 9 0a4.5 4.5 0 1 0 -9 0\"><\u002Fpath><\u002Fsvg><span style=\"font:600 15px/20px var(--font-sans);color:var(--grey-900)\">Scoped potential reach beyond what was touched<\u002Fspan><span style=\"font:400 13px/18px var(--font-sans);color:var(--grey-400)\">Worked for 3s<\u002Fspan><\u002Fdiv>\n            <p style=\"margin:0 0 20px;padding-left:29px;max-width:680px;font:400 15px/24px var(--font-sans);color:var(--grey-800)\">Beyond what he touched, his entitlements reach 3 SharePoint sites and 2 OneDrive accounts — about 18,600 sensitive records tenant-wide. That’s potential exposure, not confirmed harm. <span style=\"color:var(--grey-500)\">Next: checking notification triage and coverage.<\u002Fspan><\u002Fp>\n          <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ r5 }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"animation:lumi-fade .34s var(--ease-standard) both\">\n            <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:10px\"><svg width=\"19\" height=\"19\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"color:var(--grey-500)\"><path stroke=\"none\" d=\"M0 0h24v24H0z\" fill=\"none\"><\u002Fpath><path d=\"M11.46 20.846a12 12 0 0 1 -7.96 -14.846a12 12 0 0 0 8.5 -3a12 12 0 0 0 8.5 3c.16 .626 .27 1.264 .33 1.912\"><\u002Fpath><path d=\"M15 19l2 2l4 -4\"><\u002Fpath><\u002Fsvg><span style=\"font:600 15px/20px var(--font-sans);color:var(--grey-900)\">Checked notification triage and coverage gaps<\u002Fspan><span style=\"font:400 13px/18px var(--font-sans);color:var(--grey-400)\">Worked for 3s<\u002Fspan><\u002Fdiv>\n            <p style=\"margin:0 0 14px;padding-left:29px;max-width:680px;font:400 15px/24px var(--font-sans);color:var(--grey-800)\">This likely triggers notification under GDPR (Art. 33/34, 72h to the DPA) and CCPA (§1798.82) — HIPAA doesn’t apply here. One gap: the endpoint agent has been offline since Jun 12, so I can’t confirm whether the file was also copied to removable media. This is a triage flag for Legal/Privacy, not a notification decision.<\u002Fp>\n            <p style=\"margin:0;padding-left:29px;max-width:680px;font:400 15px/24px var(--font-sans);color:var(--grey-800)\">Net: the timing (3 days before resignation) and destination (a personal, non-corporate account) match a pre-departure exfiltration pattern, and I found no legitimate business justification for the transfer. High risk — likely pre-departure exfiltration, with the endpoint-coverage gap noted.<\u002Fp>\n          <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{ showWorking }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"display:flex;flex-direction:column;gap:14px;{{ workingPad }}\">\n            <div style=\"display:flex;align-items:center;gap:10px\"><span style=\"width:17px;height:17px;border-radius:999px;border:2px solid var(--grey-200);border-top-color:#121212;animation:lumi-spin .8s linear infinite;display:inline-block\"><\u002Fspan><\u002Fdiv>\n            <div style=\"height:12px;border-radius:6px;width:96%;background:linear-gradient(90deg,var(--grey-50) 25%,var(--grey-25) 37%,var(--grey-50) 63%);background-size:400% 100%;animation:lumi-shim 1.4s linear infinite\"><\u002Fdiv>\n            <div style=\"height:12px;border-radius:6px;width:62%;background:linear-gradient(90deg,var(--grey-50) 25%,var(--grey-25) 37%,var(--grey-50) 63%);background-size:400% 100%;animation:lumi-shim 1.4s linear infinite\"><\u002Fdiv>\n          <\u002Fdiv>\n          <\u002Fsc-if>\n          <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n\n        <!-- view toggle -->\n        <div style=\"display:inline-flex;background:var(--grey-50);border-radius:8px;padding:3px;gap:2px;margin-bottom:18px\">\n          <button sc-camel-on-click=\"{{ setReport }}\" style=\"{{ tabReportStyle }}\">Report<\u002Fbutton>\n          <button sc-camel-on-click=\"{{ setTree }}\" style=\"{{ tabTreeStyle }}\">Evidence<\u002Fbutton>\n        <\u002Fdiv>\n\n        <!-- REPORT VIEW: contents + report -->\n        <div style=\"{{ reportViewStyle }}\">\n        <div style=\"display:grid;grid-template-columns:280px 1fr;gap:20px;align-items:start\">\n          <div style=\"border:1px solid var(--grey-100);border-radius:12px;background:#fff;box-shadow:var(--shadow-sm);position:sticky;top:0;overflow:hidden\">\n            <div style=\"padding:16px 20px;border-bottom:1px solid var(--grey-100);font:500 16px/24px var(--font-sans);color:var(--grey-900)\">Contents<\u002Fdiv>\n            <div style=\"padding:10px 8px\">\n            <sc-for list=\"{{ contents }}\" as=\"c\" hint-placeholder-count=\"10\">\n              <div sc-camel-on-click=\"{{ c.onClick }}\" style=\"{{ c.style }}\"><span style=\"width:22px;flex:none;font:400 13px/18px var(--font-mono);color:var(--grey-400);text-align:right\">{{ c.n }}<\u002Fspan>{{ c.t }}<\u002Fdiv>\n            <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"border:1px solid var(--grey-100);border-radius:12px;background:#fff;box-shadow:var(--shadow-sm);min-height:520px;overflow:hidden\">\n            <div style=\"padding:16px 24px;border-bottom:1px solid var(--grey-100);font:500 16px/24px var(--font-sans);color:var(--grey-900)\">Report<\u002Fdiv>\n            <div style=\"padding:26px 28px\">\n\n            <sc-if value=\"{{ notReport }}\" hint-place  solid var(--grey-100)\">\n                  <div><div style=\"font:600 28px/32px var(--font-sans);color:var(--grey-900)\">4,128<\u002Fdiv><div style=\"font:400 13px/18px var(--font-sans);color:var(--grey-500)\">PII records exfiltrated<\u002Fdiv><\u002Fdiv>\n                  <div><div style=\"font:600 28px/32px var(--font-sans);color:var(--grey-900)\">18.6K<\u002Fdiv><div style=\"font:400 13px/18px var(--font-sans);color:var(--grey-500)\">Records within reach<\u002Fdiv><\u002Fdiv>\n                  <div><div style=\"font:600 28px/32px var(--font-sans);color:var(--grey-900)\">14<\u002Fdiv><div style=\"font:400 13px/18px var(--font-sans);color:var(--grey-500)\">Apps to revoke<\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n              <!-- 1 summary -->\n              <div id=\"sec-summary\">\n                <div style=\"font:600 11px/14px var(--font-sans);letter-spacing:.06em;text-transform:uppercase;color:var(--grey-500);margin-bottom:10px\">01 · Summary &amp; risk<\u002Fdiv>\n                <p style=\"margin:0 0 18px;font:400 17px/26px var(--font-sans);color:var(--grey-900);max-width:760px\">Enzo Fernández still holds live access to <strong style=\"font-weight:600\">589.2K sensitive records<\u002Fstrong> with her last day <strong style=\"font-weight:600\">5 days out<\u002Fstrong>. Automating this offboarding removes every standing entitlement before departure and prevents access sprawl.<\u002Fp>\n                <div style=\"display:grid;grid-template-columns:repeat(5,1fr);gap:0;border:1px solid var(--grey-100);border-radius:8px;overflow:hidden\">\n                  <div style=\"padding:16px 18px;border-right:1px solid var(--grey-100)\"><div style=\"font:500 28px/32px var(--font-sans);letter-spacing:-.01em;color:var(--grey-900)\">14<\u002Fdiv><div style=\"font:400 12px/16px var(--font-sans);color:var(--grey-600);margin-top:3px\">Applications<\u002Fdiv><\u002Fdiv>\n                  <div style=\"padding:16px 18px;border-right:1 vestigation covers <span style=\"color:var(--grey-900);font-weight:500\">{{ subjectName }}<\u002Fspan> over {{ windowVal }}. Here's what to expect.<\u002Fp>\n        <div style=\"border:1px solid var(--grey-100);border-radius:8px;overflow:hidden\">\n\n          <div style=\"padding:16px 18px;border-bottom:1px solid var(--grey-100)\">\n            <div style=\"font:600 11px/14px var(--font-sans);letter-spacing:.06em;text-transform:uppercase;color:var(--grey-500)\">What this investigation will answer<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:11px;margin-top:14px\">\n              <div style=\"display:flex;align-items:center;gap:10px\"><svg width=\"20\" height=\"20\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#121212\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex:none\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M8.5 12.5l2.4 2.4l4.6 -5.3\"><\u002Fpath><\u002Fsvg><span style=\"font:400 15px/20px var(--font-sans);color:var(--grey-900)\">Is it really them, or a compromised account?<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:10px\"><svg width=\"20\" height=\"20\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#121212\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex:none\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M8.5 12.5l2.4 2.4l4.6 -5.3\"><\u002Fpath><\u002Fsvg><span style=\"font:400 15px/20px var(--font-sans);color:var(--grey-900)\">What is their full potential reach?<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:10px\"><svg width=\"20\" height=\"20\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#121212\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex:none\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M8.5 12.5l2.4 2.4l4.6 -5.3\"><\u002Fpath><\u002Fsvg><span style=\"font:400 15px/20px var(--font-sans);color:var(--grey-900)\">What did they actually do? What’s the impact?<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:10px\"><svg width=\"20\" height=\"20\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#121212\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex:none\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M8.5 12.5l2.4 2.4l4.6 -5.3\"><\u002Fpath><\u002Fsvg><span style=\"font:400 15px/20px var(--font-sans);color:var(--grey-900)\">Why did it happen?<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <sc-if value=\"{{ hasFocus }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"padding:16px 18px;border-bottom:1px solid var(--grey-100)\">\n            <div style=\"font:600 11px/14px var(--font-sans);letter-spacing:.06em;text-transform:uppercase;color:var(--grey-500)\">Scope<\u002Fdiv>\n              <p style=\"margin:12px 0 10px;font:400 15px/22px var(--font-sans);color:var(--grey-800)\">Your prompt was translated into structured filters:<\u002Fp>\n              <div style=\"font:400 14px/20px var(--font-sans);color:var(--grey-600);border-left:2px solid var(--grey-200);padding-left:12px;margin-bottom:14px\">\"{{ focusQuote }}\"<\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:8px\">\n                <div style=\"display:flex;gap:10px\"><span style=\"width:120px;flex:none;font:400 13px/20px var(--font-sans);color:var(--grey-500)\">Action<\u002Fspan><span style=\"font:400 13px/20px var(--font-sans);color:var(--grey-900)\">exfiltration<\u002Fspan><\u002Fdiv>\n                <div style=\"display:flex;gap:10px\"><span style=\"width:120px;flex:none;font:400 13px/20px var(--font-sans);color:var(--grey-500)\">Data class<\u002Fspan><span style=\"font:400 13px/20px var(--font-sans);color:var(--grey-900)\">Not narrowed<\u002Fspan><\u002Fdiv>\n                <div an><\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:10px\"><svg width=\"18\" height=\"18\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"var(--grey-300)\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex:none\"><path stroke=\"none\" d=\"M0 0h24v24H0z\" fill=\"none\"><\u002Fpath><path d=\"M3 12a9 9 0 1 0 18 0a9 9 0 0 0 -18 0\"><\u002Fpath><path d=\"M3.6 9h16.8\"><\u002Fpath><path d=\"M3.6 15h16.8\"><\u002Fpath><path d=\"M11.5 3a17 17 0 0 0 0 18\"><\u002Fpath><path d=\"M12.5 3a17 17 0 0 1 0 18\"><\u002Fpath><\u002Fsvg><span style=\"font:400 15px/20px var(--font-sans);color:var(--grey-400)\">Destinations<\u002Fspan><span style=\"display:inline-flex;align-items:center;gap:5px;height:22px;padding:0 9px;border:1px solid var(--grey-200);border-radius:999px;font:400 12px/1 var(--font-sans);color:var(--grey-500)\"><svg width=\"12\" height=\"12\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path stroke=\"none\" d=\"M0 0h24v24H0z\" fill=\"none\"><\u002Fpath><path d=\"M5 13a2 2 0 0 1 2 -2h10a2 2 0 0 1 2 2v6a2 2 0 0 1 -2 2h-10a2 2 0 0 1 -2 -2v-6z\"><\u002Fpath><path d=\"M11 16a1 1 0 1 0 2 0a1 1 0 0 0 -2 0\"><\u002Fpath><path d=\"M8 11v-4a4 4 0 1 1 8 0v4\"><\u002Fpath><\u002Fsvg>Requires DLP license<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;justify-content:flex-end;gap:8px;height:72px;padding:0 24px;border-top:1px solid var(--grey-100)\">\n        <button sc-camel-on-click=\"{{ backToForm }}\" style=\"display:inline-flex;align-items:center;gap:8px;height:40px;padding:0 16px;border:1px solid var(--grey-200);background:#fff;font:400 16px/24px var(--font-sans);color:var(--grey-900);cursor:pointer;border-radius:8px\" style-hover=\"background:var(--grey-25);border-color:var(--grey-300)\">Back<\u002Fbutton>\n        <button sc-camel-on-click=\"{{ start }}\" style=\"display:inline-flex;align-items:center;gap:8px;height:40px;padding:0 16px;border-radius:8px;border:1px solid #121212;background:#121212;color:#fff;font:400 16px/24px var(--font-sans);cursor:pointer\" style-hover=\"background:#2D2D2D\"><svg width=\"17\" height=\"17\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path stroke=\"none\" d=\"M0 0h24v24H0z\" fill=\"none\"><\u002Fpath><path d=\"M12 6h-6a2 2 0 0 0 -2 2v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2 -2v-6\"><\u002Fpath><path d=\"M11 13l9 -9\"><\u002Fpath><path d=\"M15 4h5v5\"><\u002Fpath><\u002Fsvg>Start investigation<\u002Fbutton>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1440,&quot;height&quot;:900},&quot;startScreen&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Identity&quot;,&quot;Investigation&quot;],&quot;default&quot;:&quot;Identity&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Prototype&quot;},&quot;investigationSpeed&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Cinematic&quot;,&quot;Normal&quot;,&quot;Fast&quot;],&quot;default&quot;:&quot;Normal&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Prototype&quot;},&quot;showWhy&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Prototype&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.scrollRef = React.createRef();\n    this._timers = [];\n    this.state = {\n      screen: (props.startScreen === 'Investigation') ? 'investigation' : 'identity',\n      modalOpen: false,\n      modalStep: 'form',\n      useCase: 'of
